<!DOCTYPE html>
<html lang="en">

<head>
    <fieldset>
        <legend>Cadastro >> Incluir</legend>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
</head>

<body>
    <form action="receber dados.html" method="POST">
        <Label for="nome completo">Nome Completo:</Label>
        <input type="text" id="nome completo" name="nome completo" required>

        <label for="sexo">Sexo</label>

        <select id="sexo">
            <option value="">Selecione</option>
            <option value="m">Masculino</option>
            <option value="f">Feminino</option>
        </select>
        <br>
        <br>
        <label for="cpf">CPF:</label>
        <input type="cpf" id="cpf" name="cpf">

        <label for="rg">RG:</label>
        <input type="rg" id="rg" name="rg">

        <label for="">Nascimento</label>
        <input type="datetime-local">
        <br>
        <br>
        <label for="ddd_cel">DDD</label>
        <input type="text" id="ddd_cel" name="ddd_cel" placeholder="00">

        <label for="telefone">Telefone:</label>
        <input type="telefone" id="telefone" name="telefone">

        <label for="ddd_cel">DDD</label>
        <input type="text" id="ddd_cel" name="ddd_cel" placeholder="00">

        <label for="celular">Celular:</label>
        <input type="celular" id="celular" name="celular">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <label for="senha">Senha:</label>
        <input type="senha" id="senha" name="senha">

        <label for="confirme">Confirme:</label>
        <input type="confirme" id="confirme" name="confirme">
        <br>
        <br>
        <label for="cep">CEP:</label>
        <input type="cep" id="cep" name="cep">

        <label for="endereço">Endereço:</label>
        <input type="endereço" id="encereço" name="encereço">

        <label for="numero">Número:</label>
        <input type="numero" id="numero" name="numero">
        <br>
        <br>
        <label for="bairro">Bairro:</label>
        <input type="bairro" id="bairro" name="bairro">

        <label for="complemento">Complemento:</label>
        <input type="complemento" id="complemento" name="complemento">

        <label for="cidade">Cidade:</label>
        <input type="cidade" id="cidade" name="cidade">

        <label for="estado">Estado</label>

        <select id="estado">
            <option value="">Selecione</option>
            <option value="Acre">Acre</option>
            <option value="SP">Sao Paulo</option>
            <option value="MG">Minas Gerais</option>
            <option value="RJ">Rio de Janeiro</option>
        </select>
        </fieldset>

    </form>
</body>

</html>
